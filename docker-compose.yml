version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lightpay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lightpay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lightpay_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lightpay}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lightpay_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-lightpay_redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: lightpay_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lightpay_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lightpay.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev-tools

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: lightpay_network
